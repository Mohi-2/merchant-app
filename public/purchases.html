<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>خریدها – مدیریت واردات چین</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app-header"></div>
<main>
  <div class="card">
    <h2>ثبت خرید جدید</h2>
    <form id="purchaseForm">
      <div class="form-grid">
        <div class="field">
          <label>محصول *</label>
          <select id="productId" required></select>
        </div>
        <div class="field">
          <label>تعداد *</label>
          <input type="number" id="quantity" min="1" step="1" required>
        </div>
        <div class="field">
          <label>قیمت واحد (یوان) *</label>
          <input type="number" id="unitPriceCny" min="0" step="0.01" required>
        </div>
        <div class="field">
          <label>نرخ تبدیل یوان به تومان *</label>
          <input type="number" id="exchangeRate" min="0" step="1" required>
          <span class="hint" id="rateHint"></span>
        </div>
        <div class="field">
          <label>تامین‌کننده *</label>
          <input type="text" id="supplierName" required>
        </div>
        <div class="field">
          <label>تاریخ خرید *</label>
          <input type="date" id="purchaseDate" required>
        </div>
        <div class="field">
          <label>یادداشت</label>
          <input type="text" id="note">
        </div>
      </div>
      <p style="margin-top:14px;font-size:13px;color:var(--muted);">
        جمع کل تخمینی: <strong id="totalPreview" style="color:var(--text);">۰ تومان</strong>
      </p>
      <div style="margin-top:12px;">
        <button type="submit" class="btn primary" id="submitBtn">ثبت خرید</button>
      </div>
    </form>
  </div>
  <div class="card">
    <h2>تاریخچه خریدها</h2>
    <div id="purchasesWrap"><p class="empty">در حال بارگذاری…</p></div>
  </div>
</main>
<div id="toast"></div>
<script src="/js/api.js"></script>
<script src="/js/header.js"></script>
<script src="/js/purchases.js"></script>
</body>
</html>
