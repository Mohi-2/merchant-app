<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>دسته‌بندی‌ها – مدیریت واردات چین</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app-header"></div>
<main>
  <div class="card">
    <h2>دسته‌بندی جدید</h2>
    <form id="newCategoryForm" style="display:flex;gap:10px;align-items:flex-end;">
      <div class="field" style="flex:1;">
        <label>نام دسته‌بندی</label>
        <input type="text" id="categoryName" required placeholder="مثلاً لوازم آشپزخانه">
      </div>
      <button type="submit" class="btn primary">افزودن</button>
    </form>
  </div>
  <div class="card">
    <h2>لیست دسته‌بندی‌ها</h2>
    <div id="categoriesWrap"><p class="empty">در حال بارگذاری…</p></div>
  </div>
</main>
<div id="toast"></div>
<script src="/js/api.js"></script>
<script src="/js/header.js"></script>
<script src="/js/categories.js"></script>
</body>
</html>
